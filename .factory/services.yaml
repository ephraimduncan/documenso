commands:
  install: npm install
  build: npm run build
  lint: npm run lint
  lint-fix: npm run lint:fix
  format: npm run format

services:
  postgres:
    start: echo "Postgres already running externally"
    stop: echo "Postgres managed externally"
    healthcheck: pg_isready -h localhost -p 5432
    port: 5432
    depends_on: []
